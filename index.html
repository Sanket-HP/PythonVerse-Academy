    function App() {
      // Authentication configurations
      const [currentUser, setCurrentUser] = useState(() => {
        try {
          const saved = localStorage.getItem("pv_user");
          return saved ? JSON.parse(saved) : null;
        } catch (e) {
          return null;
        }
      });

      const [loginId, setLoginId] = useState("");
      const [loginPassword, setLoginPassword] = useState("");
      const [loginError, setLoginError] = useState("");

      // Course project execution parameters
      const [activeTaskIdx, setActiveTaskIndex] = useState(0);
      const [completedTaskIds, setCompletedTaskIds] = useState(() => {
        try {
          const saved = localStorage.getItem("pv_completed_tasks");
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      const [workspaceFiles, setWorkspaceFiles] = useState({
        "main.py": "",
        "data.csv": "Names,Scores\nKedar,320\nPranav,310\nRajlakshmi,420\nSamruddhi,450\nKalyani,390\n",
        "README.md": "# PythonVerse Workspace\nSelect a task from the list on the left to begin coding."
      });
      const [activeFile, setActiveFile] = useState("main.py");
      const [terminalLogs, setTerminalLogs] = useState(["Environment ready. Select any task module on the left side directory to initialize code structures!"]);
      const [viewMode, setViewMode] = useState("terminal"); // 'terminal' | 'preview'
      const [previewData, setPreviewContent] = useState(null);
      const [newFileName, setNewFileName] = useState("");
      const [showFileModal, setShowFileModal] = useState(false);
      const [toast, setToast] = useState(null);

      // Admin State Variables
      const [selectedAdminStudentId, setSelectedAdminStudentId] = useState("KD001");
      const [adminAnnTitle, setAdminAnnTitle] = useState("");
      const [adminAnnText, setAdminAnnText] = useState("");
      const [announcements, setAnnouncements] = useState(() => {
        try {
          const saved = localStorage.getItem("pv_announcements");
          return saved ? JSON.parse(saved) : [
            { id: 1, title: "Welcome to PythonVerse!", date: "June 25, 2026", text: "Complete each milestone task sequentially using the Check My Progress system. Your progress will be saved automatically." }
          ];
        } catch (e) {
          return [];
        }
      });

      // Retrieve student-specific data
      const studentProject = useMemo(() => {
        if (currentUser && currentUser.role === "student") {
          return PROJECTS_DATABASE[currentUser.id];
        }
        return null;
      }, [currentUser]);

      const activeTask = useMemo(() => {
        if (studentProject) {
          return studentProject.tasks[activeTaskIdx];
        }
        return null;
      }, [studentProject, activeTaskIdx]);

      // Handle loading task template dynamically when task switches
      useEffect(() => {
        if (activeTask) {
          setWorkspaceFiles(prev => ({
            ...prev,
            "main.py": activeTask.codeTemplate
          }));
          setActiveFile("main.py");
          setPreviewContent(null);
        }
      }, [activeTaskIdx, activeTask]);

      // Synchronize states
      useEffect(() => {
        try {
          localStorage.setItem("pv_user", currentUser ? JSON.stringify(currentUser) : "");
          localStorage.setItem("pv_completed_tasks", JSON.stringify(completedTaskIds));
          localStorage.setItem("pv_announcements", JSON.stringify(announcements));
        } catch (e) {}
      }, [currentUser, completedTaskIds, announcements]);

      const triggerToast = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      };

      // Authentication action handlers
      const handleLogin = (e) => {
        e.preventDefault();
        const match = USER_ROSTER.find(
          u => u.id.trim() === loginId.trim() && u.password === loginPassword
        );

        if (match) {
          setCurrentUser(match);
          setLoginError("");
          setLoginId("");
          setLoginPassword("");
          triggerToast(`Welcome to PythonVerse, ${match.name}!`);
        } else {
          setLoginError("Invalid predefined ID or password combination.");
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setCompletedTaskIds([]);
        triggerToast("Logged out of session.");
      };

      // Tab indentation handler inside code sandbox
      const handleTabKey = (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const { selectionStart, selectionEnd, value } = e.target;
          const spaces = "    ";
          const updated = value.substring(0, selectionStart) + spaces + value.substring(selectionEnd);
          setWorkspaceFiles(prev => ({ ...prev, [activeFile]: updated }));
          setTimeout(() => {
            e.target.selectionStart = e.target.selectionEnd = selectionStart + spaces.length;
          }, 0);
        }
      };

      // Standard run code compiler simulation
      const handleRunCode = () => {
        const code = workspaceFiles["main.py"] || "";
        setTerminalLogs(prev => [...prev, `\n$ python main.py`]);
        setViewMode("terminal");

        setTimeout(() => {
          let output = [];

          if (code.includes("import numpy") && (code.includes("np.array") || code.includes("zeros"))) {
            output.push("NumPy: Loading matrix grids successfully...");
            output.push("Matrix dimensions registered in memory.");
            setPreviewContent({
              type: "chart",
              labels: ["X-Zone", "Y-Zone", "Z-Zone"],
              data: [120, 240, 180],
              title: "Normalized Vector Distribution Charts"
            });
          } else if (code.includes("import pandas") && code.includes("pd.DataFrame")) {
            output.push("Pandas: Structuring transaction series dataframe...");
            output.push("Tabular rows parsed successfully.");
            setPreviewContent({
              type: "chart",
              labels: ["Kedar", "Pranav", "Rajlakshmi", "Samruddhi", "Kalyani"],
              data: [320, 310, 420, 450, 390],
              title: "Pandas DataFrame Matrix Output"
            });
          } else if (code.includes("sqlite3") && code.includes("connect")) {
            output.push("SQLite3: Connection established.");
            output.push("Tables registered successfully.");
            setPreviewContent({ type: "sqlite" });
          } else if (code.includes("from fastapi import FastAPI") || code.includes("from flask import Flask")) {
            output.push("Server running on http://127.0.0.1:8000");
            output.push("API routers connected successfully.");
            setPreviewContent({ type: "fastapi" });
          } else {
            output.push("Process exited with return code 0. Standard output stream evaluated.");
          }

          setTerminalLogs(prev => [...prev, output.join("\n")]);
          triggerToast("Run compilation successful!");
        }, 500);
      };

      // "Check My Progress" validator: checks the code against rules
      const handleCheckProgress = () => {
        if (!activeTask) return;
        const code = workspaceFiles["main.py"] || "";
        const validated = activeTask.verify(code);

        if (validated) {
          if (!completedTaskIds.includes(activeTask.id)) {
            const nextCompleted = [...completedTaskIds, activeTask.id];
            setCompletedTaskIds(nextCompleted);
            triggerToast(`🎉 Task Complete: "${activeTask.title}" verified!`, "success");
            setTerminalLogs(prev => [...prev, `\n[SYSTEM]: Successfully verified task: "${activeTask.title}"`]);

            // Update README.md dynamically
            const autoReadme = `# ${studentProject.projectName} Portfolio\n\n## Roster Owner\n- **Student Name**: ${studentProject.studentName}\n- **Classroom ID**: ${currentUser.id}\n\n## Tasks Completed Matrix\n${nextCompleted.map((id, index) => {
              const matching = studentProject.tasks.find(t => t.id === id);
              return `- **[x] Task ${index + 1}: ${matching.title}** utilizing *${matching.library}* (Use case: ${matching.useCase})`;
            }).join("\n")}\n\n*Auto-generated on progress checks.*`;
            
            setWorkspaceFiles(prev => ({
              ...prev,
              "README.md": autoReadme
            }));
          } else {
            triggerToast("This task is already verified!", "success");
          }
        } else {
          triggerToast("❌ Verification failed. Please ensure all task requirements are met.", "error");
          setTerminalLogs(prev => [...prev, `\n[SYSTEM ERROR]: Verification failed on "${activeTask.title}". Check imports or array definitions.`]);
        }
      };

      // Automatically generate a complete README on active request
      const forceAutoReadme = () => {
        if (!studentProject) return;
        const total = studentProject.tasks.length;
        const current = studentProject.tasks.filter(t => completedTaskIds.includes(t.id)).length;
        
        const text = `# ${studentProject.projectName} Portfolio\n\n## Academic Summary\n- **Project Status**: ${current === total ? "COMPLETED" : "IN PROGRESS"}\n- **Tasks Completed**: ${current} / ${total} tasks checked.\n\n## Progressive Project Tasks Map\n${studentProject.tasks.map((t, idx) => {
          const isDone = completedTaskIds.includes(t.id);
          return `### Task ${idx + 1}: ${t.title}\n- **Library/Framework**: \`${t.library}\`\n- **Verification Status**: ${isDone ? "✅ VERIFIED" : "⏳ IN PROGRESS"}\n- **Use case**: ${t.useCase}\n`;
        }).join("\n")}\n\n*Auto-generated inside PythonVerse Sandbox.*`;

        setWorkspaceFiles(prev => ({ ...prev, "README.md": text }));
        setActiveFile("README.md");
        triggerToast("Custom README.md successfully created inside Workspace!");
      };

      // Simulated project download containing all code assets
      const handleDownloadProject = () => {
        let manifest = `========================================================\nPYTHONVERSE PROJECT WORKSPACE ZIP BUNDLE\n========================================================\n\n`;
        Object.keys(workspaceFiles).forEach(fileName => {
          manifest += `--- FILE: ${fileName} ---\n${workspaceFiles[fileName]}\n\n`;
        });

        const blob = new Blob([manifest], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${studentProject ? studentProject.projectName.replace(/\s+/g, '_') : 'python_project'}_workspace.zip.txt`;
        a.click();
        URL.revokeObjectURL(url);
        triggerToast("Downloaded simulated project structure package!");
      };

      // File system creation handlers
      const handleCreateFile = (e) => {
        e.preventDefault();
        const f = newFileName.trim();
        if (!f) return;
        if (workspaceFiles[f]) {
          triggerToast("File already exists!", "error");
          return;
        }
        setWorkspaceFiles(prev => ({ ...prev, [f]: `# Module: ${f}\n# Start typing here...` }));
        setActiveFile(f);
        setNewFileName("");
        setShowFileModal(false);
        triggerToast(`Created file: ${f}`);
      };

      const handleDeleteFile = (name) => {
        if (name === "main.py" || name === "README.md") {
          triggerToast("Core files cannot be deleted!", "error");
          return;
        }
        const cloned = { ...workspaceFiles };
        delete cloned[name];
        setWorkspaceFiles(cloned);
        if (activeFile === name) setActiveFile("main.py");
        triggerToast(`Removed file: ${name}`);
      };

      // Admin actions
      const postAnnouncement = (e) => {
        e.preventDefault();
        if (!adminAnnTitle.trim() || !adminAnnText.trim()) return;

        const banner = {
          id: Date.now(),
          title: adminAnnTitle,
          date: new Date().toLocaleDateString(),
          text: adminAnnText
        };

        setAnnouncements(prev => [banner, ...prev]);
        setAdminAnnTitle("");
        setAdminAnnText("");
        triggerToast("Broadcast published!");
      };

      const resetStudentProgress = (id) => {
        const student = USER_ROSTER.find(s => s.id === id);
        if (!student) return;

        // Clear completed task IDs matching this student's task templates prefix
        const prefix = id === "KD001" ? "kd_" : id === "PJ002" ? "pj_" : id === "RK003" ? "rk_" : id === "SP004" ? "sp_" : "kk_";
        const nextCompleted = completedTaskIds.filter(taskId => !taskId.startsWith(prefix));
        setCompletedTaskIds(nextCompleted);
        triggerToast(`Progress for ${student.name} reset successfully!`);
      };

        if (!studentProject) return false;

                              <div className="bg-white border border-earth-200 p-4 rounded-xl text-left space-y-3 shadow-sm">
                                <div className="border-b pb-2 flex justify-between items-center">
                                  <span className="text-[10px] font-extrabold text-earth-400 uppercase tracking-widest">FastAPI Swagger UI</span>
                                  <span className="bg-emerald-100 text-emerald-800 text-[9px] font-bold px-2 py-0.5 rounded-full">HTTP OK</span>
                                </div>
                                <div className="bg-emerald-50 border border-emerald-100 p-2.5 rounded-lg flex items-center justify-between text-xs text-emerald-800 font-semibold">
                                  <span>GET /health</span>
                                  <span className="text-[10px]">Read Home</span>
                                </div>
                                <pre className="p-3 bg-earth-50 rounded-lg text-[10px] text-earth-500 font-mono">
                                  {`{\n  "academy": "PythonVerse",\n  "status": "active"\n}`}
                                </pre>
                              </div>
                            )}
                          </div>
                        ) : (
                          <div className="text-center text-earth-400 py-12">
                            <span className="text-3xl mb-2 block">📊</span>
                            <div className="font-bold text-xs">No preview graphics generated.</div>
                            <p className="text-[10px] max-w-xs mx-auto mt-1">Execute correct main.py logic matching the active milestone checklist to draw visualizations here.</p>
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                </div>

              </div>

            </div>

          </div>

          {/* New File Creation Modal Dialog */}
          {showFileModal && (
            <div className="fixed inset-0 bg-[#3e2920]/40 z-50 flex items-center justify-center p-4 animate-fadeIn">
              <div className="bg-white border border-earth-200 rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-xl animate-scaleUp">
                <h3 className="font-extrabold text-sm text-earth-800">Add Workspace File</h3>
                <form onSubmit={handleCreateFile} className="space-y-4">
                  <input
                    type="text"
                    placeholder="e.g. database.py or inputs.json"
                    value={newFileName}
                    onChange={e => setNewFileName(e.target.value)}
                    className="w-full px-4 py-2 rounded-xl border border-earth-200 bg-earth-50 text-xs text-earth-800 focus:outline-none focus:ring-2 focus:ring-earth-500 font-mono"
                    required
                  />
                  <div className="flex justify-end space-x-2">
                    <button
                      type="button"
                      onClick={() => setShowFileModal(false)}
                      className="px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-earth-100 transition text-earth-500"
                    >
                      Cancel
                    </button>
                    <button
                      type="submit"
                      className="bg-earth-700 text-earth-50 px-4 py-1.5 rounded-lg text-xs font-bold transition"
                    >
                      Create
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    // --- INITIALIZE ACADEMY APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
