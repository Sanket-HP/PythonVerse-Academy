<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PythonVerse Academy - Project Platform</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            earth: {
              50: '#fdfbf7',   // warm alabaster
              100: '#f5f2eb',  // soft cream
              200: '#e7e0d5',  // light sand
              300: '#d5c9b8',  // dark sand
              400: '#bca895',  // pale tan
              500: '#9d826e',  // warm brown
              600: '#846654',  // rich walnut
              700: '#6c4e3d',  // deep clay
              800: '#553c2f',  // espresso
              900: '#3e2920',  // charcoal brown
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .monospace {
      font-family: 'Fira Code', monospace;
    }
    /* Light/Brown custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #fdfbf7;
    }
    ::-webkit-scrollbar-thumb {
      background: #d5c9b8;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #bca895;
    }
    /* Warm light selection */
    ::selection {
      background: #e7e0d5;
      color: #553c2f;
    }
  </style>
</head>
<body class="bg-earth-50 text-earth-900 min-h-screen flex flex-col transition-colors duration-200">

  <!-- React Mount Point -->
  <div id="root" class="min-h-screen flex flex-col"></div>

  <!-- Reliable jsDelivr CDNs for high-uptime browser loading -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js" crossorigin></script>

  <!-- Application Source Code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- BULLETPROOF SVG ICONS (Warm Brown Styled) ---
    const Icons = {
      BookOpen: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>,
      Code: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" /></svg>,
      CheckCircle: () => <svg className="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Terminal: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z" /></svg>,
      Sparkles: () => <svg className="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21l-.813-5.096L3 15l5.096-.813L9 9l.813 5.187L15 15l-5.187.813z" /></svg>,
      Trash: () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      Download: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>,
      Plus: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>,
      FileText: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>,
      Clock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Play: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z" /></svg>
    };

    // --- CURRICULUM PROJECT TASKS & REAL VERIFICATION RULES ---
    const CURRICULUM_TASKS = [
      {
        id: "numpy_matrices",
        title: "NumPy Matrix Optimizer",
        library: "NumPy",
        difficulty: "Beginner",
        estimatedTime: "25 mins",
        useCase: "Data Normalization & Multi-dimensional Matrix Scaling",
        info: "NumPy is the foundational package for scientific computing in Python. It offers high-performance N-dimensional array processing. This task asks you to scale a numeric vector/array.",
        syntaxGuide: "import numpy as np\n# To scale, divide array elements by their maximum or compute average:\narr = np.array([1.2, 3.4, 5.6])\nprint('Mean:', np.mean(arr))",
        requirements: [
          "Import NumPy utilizing the alias: 'import numpy as np'",
          "Define a matrix array containing grades: np.array([88, 92, 95])",
          "Find and print the average grade using: np.mean(matrix)"
        ],
        verifyCode: (code) => {
          const hasImport = code.includes("import numpy as np");
          const hasArray = code.includes("np.array") && code.includes("88") && code.includes("92") && code.includes("95");
          const hasMean = code.includes("np.mean");
          return {
            success: hasImport && hasArray && hasMean,
            errors: [
              !hasImport && "Missing alias: 'import numpy as np'",
              !hasArray && "Make sure to declare 'np.array([88, 92, 95])'",
              !hasMean && "Calculate the statistical mean using 'np.mean()'"
            ].filter(Boolean)
          };
        },
        codeTemplate: `import numpy as np\n\n# Task 1: Initialize NumPy arrays\ngrades = np.array([88, 92, 95])\n\n# Compute average below:\navg_grade = np.mean(grades)\nprint("Average:", avg_grade)\n`
      },
      {
        id: "pandas_cleaning",
        title: "Pandas DataFrame Aggregator",
        library: "Pandas",
        difficulty: "Intermediate",
        estimatedTime: "40 mins",
        useCase: "Analyzing spreadsheets, tabular records, and cleaning null values",
        info: "Pandas introduces DataFrame grids. It allows rapid grouping, indexing, and statistical aggregates over row structures.",
        syntaxGuide: "import pandas as pd\ndata = {'Names': ['Sam', 'Raj'], 'XP': [300, 450]}\ndf = pd.DataFrame(data)\nprint(df.describe())",
        requirements: [
          "Import Pandas with typical alias: 'import pandas as pd'",
          "Create a DataFrame containing labels 'Names' and 'Scores' inside a dictionary.",
          "Invoke df.describe() or df.mean() to print analytical insights."
        ],
        verifyCode: (code) => {
          const hasImport = code.includes("import pandas as pd");
          const hasDF = code.includes("pd.DataFrame");
          const hasDescribe = code.includes("describe()") || code.includes("mean()");
          return {
            success: hasImport && hasDF && hasDescribe,
            errors: [
              !hasImport && "Missing statement: 'import pandas as pd'",
              !hasDF && "Make sure to instantiate a pandas table with 'pd.DataFrame()'",
              !hasDescribe && "Call 'describe()' or 'mean()' on your DataFrame to print summaries."
            ].filter(Boolean)
          };
        },
        codeTemplate: `import pandas as pd\n\n# Task 2: Create dictionary database\nraw_data = {\n    "Names": ["Kedar", "Pranav", "Rajlakshmi", "Samruddhi", "Kalyani"],\n    "Scores": [320, 310, 420, 450, 390]\n}\n\n# Load into DataFrame:\ndf = pd.DataFrame(raw_data)\nprint(df.describe())\n`
      },
      {
        id: "sqlite_engine",
        title: "SQLite Relational Ledger",
        library: "SQLite3",
        difficulty: "Intermediate",
        estimatedTime: "50 mins",
        useCase: "Local SQL records transaction ledger inside disk files",
        info: "SQLite provides robust structural query transactions inside dynamic local files without configuring major daemon services.",
        syntaxGuide: "import sqlite3\nconn = sqlite3.connect('local.db')\nconn.execute('CREATE TABLE IF NOT EXISTS ledger (id INTEGER, val TEXT)')\nconn.commit()",
        requirements: [
          "Import the standard database driver: 'import sqlite3'",
          "Establish database connection: 'sqlite3.connect(\"academy.db\")'",
          "Execute an SQL command: 'CREATE TABLE IF NOT EXISTS users (id INTEGER, score INTEGER)'"
        ],
        verifyCode: (code) => {
          const hasImport = code.includes("import sqlite3");
          const hasConnect = code.includes("sqlite3.connect");
          const hasSQL = code.includes("CREATE TABLE") && code.includes("users");
          return {
            success: hasImport && hasConnect && hasSQL,
            errors: [
              !hasImport && "Missing standard SQLite import: 'import sqlite3'",
              !hasConnect && "Open standard connection using 'sqlite3.connect()'",
              !hasSQL && "Execute SQL schema check: 'CREATE TABLE IF NOT EXISTS users...'"
            ].filter(Boolean)
          };
        },
        codeTemplate: `import sqlite3\n\n# Task 3: Open file database connection\nconn = sqlite3.connect("academy.db")\ncursor = conn.cursor()\n\n# Create users schema below:\ncursor.execute("CREATE TABLE IF NOT EXISTS users (id INTEGER, score INTEGER)")\nconn.commit()\nconn.close()\nprint("Database connection executed safely!")\n`
      },
      {
        id: "fastapi_routers",
        title: "FastAPI REST Controller",
        library: "FastAPI",
        difficulty: "Advanced",
        estimatedTime: "60 mins",
        useCase: "Building blazing fast asynchronous API routing structures",
        info: "FastAPI utilizes standard modern typing decorators to automatically register HTTP routers, sanitize inputs, and build interactive documentation panels.",
        syntaxGuide: "from fastapi import FastAPI\napp = FastAPI()\n@app.get('/')\ndef root():\n    return {'status': 'success'}",
        requirements: [
          "Import FastAPI using keyword: 'from fastapi import FastAPI'",
          "Create your routing server instance: 'app = FastAPI()'",
          "Bind a standard GET path mapping: '@app.get(\"/books\")' or '@app.get(\"/\")'"
        ],
        verifyCode: (code) => {
          const hasImport = code.includes("from fastapi import FastAPI");
          const hasApp = code.includes("app = FastAPI()");
          const hasGet = code.includes("@app.get");
          return {
            success: hasImport && hasApp && hasGet,
            errors: [
              !hasImport && "Missing library statement: 'from fastapi import FastAPI'",
              !hasApp && "Construct server variables instance: 'app = FastAPI()'",
              !hasGet && "Provide API router binding: e.g. '@app.get(\"/\")'"
            ].filter(Boolean)
          };
        },
        codeTemplate: `from fastapi import FastAPI\n\n# Task 4: Construct high performance microservice router\napp = FastAPI()\n\n@app.get("/")\ndef home():\n    return {"academy": "PythonVerse", "status": "active"}\n`
      }
    ];

    function App() {
      const [activeTaskIdx, setActiveTaskIndex] = useState(0);
      const [workspaceFiles, setWorkspaceFiles] = useState({
        "main.py": CURRICULUM_TASKS[0].codeTemplate,
        "data.csv": "Names,Scores\nKedar,320\nPranav,310\nRajlakshmi,420\nSamruddhi,450\nKalyani,390\n",
        "README.md": "# PythonVerse Workspace\nSelect tasks from the left panel to begin working.\n"
      });
      const [activeFile, setActiveFile] = useState("main.py");
      const [completedTaskIds, setCompletedTaskIds] = useState([]);
      const [terminalLogs, setTerminalLogs] = useState(["Workspace ready. Select a milestone task to code!"]);
      const [toast, setToast] = useState(null);
      const [viewMode, setViewMode] = useState("terminal"); // 'terminal' | 'preview'
      const [previewData, setPreviewContent] = useState(null);
      const [newFileName, setNewFileName] = useState("");
      const [showFileModal, setShowFileModal] = useState(false);

      const activeTask = CURRICULUM_TASKS[activeTaskIdx];

      // Automatically load the code template when active task switches
      useEffect(() => {
        setWorkspaceFiles(prev => ({
          ...prev,
          "main.py": activeTask.codeTemplate
        }));
        setActiveFile("main.py");
        setPreviewContent(null);
      }, [activeTaskIdx]);

      const triggerToast = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      };

      // Tab indentation handler inside standard code sandbox
      const handleTabKey = (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const { selectionStart, selectionEnd, value } = e.target;
          const spaces = "    ";
          const updated = value.substring(0, selectionStart) + spaces + value.substring(selectionEnd);
          setWorkspaceFiles(prev => ({ ...prev, [activeFile]: updated }));
          setTimeout(() => {
            e.target.selectionStart = e.target.selectionEnd = selectionStart + spaces.length;
          }, 0);
        }
      };

      // Standard run code simulator
      const handleRunCode = () => {
        const code = workspaceFiles["main.py"] || "";
        setTerminalLogs(prev => [...prev, `\n$ python main.py`]);
        setViewMode("terminal");

        setTimeout(() => {
          let output = [];

          if (code.includes("import numpy") && code.includes("np.mean")) {
            output.push("Initializing NumPy matrix vector...");
            output.push("Loaded matrix array successfully.");
            output.push("Calculated Mean Average value: 91.667");
            setPreviewContent({
              type: "chart",
              labels: ["A", "B", "C"],
              data: [88, 92, 95],
              title: "NumPy Array Summary Chart"
            });
          } else if (code.includes("import pandas") && code.includes("pd.DataFrame")) {
            output.push("Constructing pandas structural table layout...");
            output.push("Calculated aggregation describe() successfully.");
            setPreviewContent({
              type: "chart",
              labels: ["Kedar", "Pranav", "Raj", "Sam", "Kalyani"],
              data: [320, 310, 420, 450, 390],
              title: "Pandas Analytical Plot Output"
            });
          } else if (code.includes("sqlite3") && code.includes("CREATE TABLE")) {
            output.push("Connected SQLite DB ledger: academy.db");
            output.push("SQL Query success: Schema updated safely.");
            setPreviewContent({
              type: "sqlite"
            });
          } else if (code.includes("from fastapi import FastAPI")) {
            output.push("Uvicorn active pipeline: http://127.0.0.1:8000");
            output.push("Server initialized successfully.");
            setPreviewContent({
              type: "fastapi"
            });
          } else {
            output.push("Script compiled successfully. Process exited with return status code 0.");
          }

          setTerminalLogs(prev => [...prev, output.join("\n")]);
          triggerToast("Program compilation successful!");
        }, 500);
      };

      // VERIFY PROGRESS SYSTEM: checks the code against rules
      const handleCheckProgress = () => {
        const code = workspaceFiles["main.py"] || "";
        const checkResult = activeTask.verifyCode(code);

        if (checkResult.success) {
          if (!completedTaskIds.includes(activeTask.id)) {
            const nextCompleted = [...completedTaskIds, activeTask.id];
            setCompletedTaskIds(nextCompleted);
            
            // Generate auto-updated README
            const taskTitles = nextCompleted.map(id => CURRICULUM_TASKS.find(t => t.id === id).title).join(", ");
            const autoReadme = `# PythonVerse Workspace Portfolio\n\n## Completed Modules\n${nextCompleted.map(id => {
              const matchingTask = CURRICULUM_TASKS.find(t => t.id === id);
              return `- **[x] ${matchingTask.title}** utilizing *${matchingTask.library}* (Goal: ${matchingTask.useCase})`;
            }).join("\n")}\n\n*Auto-generated dynamically via progress check-in tags.*`;
            
            setWorkspaceFiles(prev => ({
              ...prev,
              "README.md": autoReadme
            }));

            triggerToast(`🎉 Task Approved! You completed: ${activeTask.title}!`, "success");
            setTerminalLogs(prev => [...prev, `\n[SYSTEM]: Verified task "${activeTask.title}" as completed successfully!`]);
          } else {
            triggerToast("You already cleared this task! Good job.", "success");
          }
        } else {
          const firstErr = checkResult.errors[0] || "Code criteria verification failed.";
          triggerToast(`❌ Verification failed: ${firstErr}`, "error");
          setTerminalLogs(prev => [...prev, `\n[SYSTEM WARNING]: ${checkResult.errors.join("\n[SYSTEM WARNING]: ")}`]);
        }
      };

      // Automatically generate a complete README on active request
      const forceAutoReadme = () => {
        const total = CURRICULUM_TASKS.length;
        const current = completedTaskIds.length;
        const autoText = `# PythonVerse Workspace Portfolio\n\n## Academic Summary\n- **Project Status**: ${current === total ? "COMPLETED" : "IN PROGRESS"}\n- **Verification Completion**: ${current} / ${total} tasks checked.\n\n## Projects Detail Roadmap\n${CURRICULUM_TASKS.map((t, idx) => {
          const done = completedTaskIds.includes(t.id);
          return `### ${idx + 1}. ${t.title}\n- **Library**: \`${t.library}\`\n- **Status**: ${done ? "✅ COMPLETED" : "⏳ IN PROGRESS"}\n- **Goal**: ${t.useCase}\n`;
        }).join("\n")}\n\n*Auto-generated safely on ${new Date().toLocaleDateString()}*`;

        setWorkspaceFiles(prev => ({
          ...prev,
          "README.md": autoText
        }));
        setActiveFile("README.md");
        triggerToast("Generated custom README.md inside sandbox.");
      };

      // Simulated project download containing all code assets
      const handleDownloadProject = () => {
        let textManifest = `========================================================\nPYTHONVERSE ACADEMY PROJECT WORKSPACE ZIP BUNDLE\n========================================================\n\n`;
        Object.keys(workspaceFiles).forEach(fileName => {
          textManifest += `--- FILE: ${fileName} ---\n${workspaceFiles[fileName]}\n\n`;
        });

        const blob = new Blob([textManifest], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "pythonverse_completed_project.zip.txt";
        a.click();
        URL.revokeObjectURL(url);
        triggerToast("Downloaded simulated project bundle!");
      };

      const handleCreateFile = (e) => {
        e.preventDefault();
        const f = newFileName.trim();
        if (!f) return;
        if (workspaceFiles[f]) {
          triggerToast("File already exists!", "error");
          return;
        }
        setWorkspaceFiles(prev => ({ ...prev, [f]: `# Module: ${f}\n# Start typing here...` }));
        setActiveFile(f);
        setNewFileName("");
        setShowFileModal(false);
        triggerToast(`Created file: ${f}`);
      };

      const handleDeleteFile = (name) => {
        if (name === "main.py" || name === "README.md") {
          triggerToast("Core files cannot be deleted!", "error");
          return;
        }
        const cloned = { ...workspaceFiles };
        delete cloned[name];
        setWorkspaceFiles(cloned);
        if (activeFile === name) setActiveFile("main.py");
        triggerToast(`Removed file: ${name}`);
      };

      const isAllProjectCompleted = completedTaskIds.length === CURRICULUM_TASKS.length;

      return (
        <div className="flex-1 flex flex-col bg-earth-50">
          
          {/* Header Panel */}
          <header className="border-b border-earth-200 bg-earth-100 px-6 py-4 flex items-center justify-between shadow-sm">
            <div className="flex items-center space-x-3">
              <div className="bg-earth-600 p-2.5 rounded-xl text-earth-50">
                <Icons.Code />
              </div>
              <div>
                <h1 className="font-extrabold text-lg text-earth-800 tracking-tight">
                  PythonVerse <span className="text-earth-500 font-light">Academy</span>
                </h1>
                <p className="text-[10px] text-earth-500 font-semibold tracking-wider uppercase">Project Workspace</p>
              </div>
            </div>

            <div className="flex items-center space-x-4">
              <div className="hidden md:flex items-center space-x-3 text-xs bg-white border border-earth-200 px-4 py-2 rounded-xl">
                <span className="font-semibold text-earth-700">Course Completion Track:</span>
                <div className="w-24 bg-earth-200 h-2.5 rounded-full overflow-hidden">
                  <div 
                    style={{ width: `${(completedTaskIds.length / CURRICULUM_TASKS.length) * 100}%` }}
                    className="bg-earth-600 h-full transition-all duration-300"
                  />
                </div>
                <span className="font-bold text-earth-800">{completedTaskIds.length} / {CURRICULUM_TASKS.length}</span>
              </div>

              <button
                onClick={handleDownloadProject}
                className="bg-earth-700 hover:bg-earth-800 text-earth-50 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center space-x-1.5 shadow-sm"
              >
                <Icons.Download />
                <span>Download Project</span>
              </button>
            </div>
          </header>

          {/* Toast Alert popup */}
          {toast && (
            <div className={`fixed top-4 right-4 z-50 flex items-center space-x-2 px-5 py-3 rounded-xl shadow-md text-xs font-bold transition-all transform ${
              toast.type === "error" ? "bg-red-50 border border-red-200 text-red-800" : "bg-earth-100 border border-earth-300 text-earth-800"
            }`}>
              <span>{toast.msg}</span>
            </div>
          )}

          {/* Core Playground */}
          <div className="flex-1 flex flex-col lg:flex-row overflow-hidden max-h-[calc(100vh-73px)]">
            
            {/* Left Side: Tasks & Curriculum Info (White and light Brown style) */}
            <aside className="w-full lg:w-[420px] bg-white border-r border-earth-200 p-6 flex flex-col justify-between overflow-y-auto animate-fadeIn">
              <div className="space-y-6">
                <div>
                  <h2 className="text-xs font-extrabold text-earth-500 uppercase tracking-widest mb-1">Project Modules</h2>
                  <p className="text-xs text-earth-400">Complete each milestone task below by updating `main.py` in the workspace.</p>
                </div>

                {/* Vertical Task Milestones List */}
                <div className="space-y-3">
                  {CURRICULUM_TASKS.map((t, idx) => {
                    const active = activeTaskIdx === idx;
                    const done = completedTaskIds.includes(t.id);
                    return (
                      <div
                        key={t.id}
                        onClick={() => setActiveTaskIndex(idx)}
                        className={`p-4 rounded-xl border text-left cursor-pointer transition ${
                          active
                            ? "bg-earth-100 border-earth-300 shadow-sm"
                            : "bg-earth-50/50 hover:bg-earth-50 border-earth-200"
                        }`}
                      >
                        <div className="flex items-center justify-between mb-1.5">
                          <span className="text-[10px] font-extrabold uppercase text-earth-500 tracking-wider">
                            Task {idx + 1} • {t.library}
                          </span>
                          {done && (
                            <span className="flex items-center space-x-0.5 text-xs text-emerald-700 font-bold bg-emerald-50 px-2 py-0.5 rounded-full">
                              <Icons.CheckCircle />
                              <span className="text-[10px]">Verified</span>
                            </span>
                          )}
                        </div>

                        <h3 className="font-bold text-sm text-earth-800 mb-2">{t.title}</h3>

                        {/* Local progress bar for this specific task */}
                        <div className="space-y-1">
                          <div className="flex justify-between text-[10px] text-earth-400 font-semibold">
                            <span>Completeness</span>
                            <span>{done ? "100%" : "0%"}</span>
                          </div>
                          <div className="w-full bg-earth-200 h-1.5 rounded-full overflow-hidden">
                            <div
                              style={{ width: done ? "100%" : "0%" }}
                              className="bg-earth-600 h-full transition-all duration-300"
                            />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Selected Active Task Documentation */}
                <div className="border-t border-earth-200 pt-6 space-y-4">
                  <div>
                    <h3 className="text-xs font-extrabold text-earth-500 uppercase tracking-widest">Active Task Guide</h3>
                    <h4 className="font-extrabold text-base text-earth-800 mt-1">{activeTask.title}</h4>
                    <p className="text-xs text-earth-500 mt-2 leading-relaxed italic">
                      "Use case: {activeTask.useCase}"
                    </p>
                  </div>

                  <div className="space-y-1.5">
                    <span className="text-[10px] font-extrabold text-earth-400 uppercase tracking-widest">Library Information</span>
                    <p className="text-xs text-earth-600 leading-relaxed bg-earth-50 p-3 rounded-lg border border-earth-100 font-medium">
                      {activeTask.info}
                    </p>
                  </div>

                  <div className="space-y-2">
                    <span className="text-[10px] font-extrabold text-earth-400 uppercase tracking-widest">Verification Criteria</span>
                    <ul className="list-disc pl-4 space-y-1">
                      {activeTask.requirements.map((req, i) => (
                        <li key={i} className="text-xs text-earth-600 leading-relaxed">
                          {req}
                        </li>
                      ))}
                    </ul>
                  </div>

                  <div className="space-y-2">
                    <span className="text-[10px] font-extrabold text-earth-400 uppercase tracking-widest">Syntax Assistant Snippet</span>
                    <pre className="p-3 bg-earth-100 rounded-lg text-xs monospace text-earth-800 select-all border border-earth-200 whitespace-pre-wrap leading-relaxed">
                      {activeTask.syntaxGuide}
                    </pre>
                  </div>
                </div>
              </div>

              {/* Reset progress and help tools */}
              <div className="border-t border-earth-200 pt-6 mt-6 flex flex-col space-y-2">
                <button
                  onClick={() => {
                    setCompletedTaskIds([]);
                    setTerminalLogs(["Workspace reset. Starting from Task 1!"]);
                    setWorkspaceFiles(prev => ({
                      ...prev,
                      "README.md": "# PythonVerse Workspace\nSelect tasks from the left panel to begin working.\n"
                    }));
                    triggerToast("Reset all task completions.");
                  }}
                  className="w-full text-center text-xs font-semibold text-earth-500 hover:text-earth-700 py-1"
                >
                  Clear Progress & Restart Course
                </button>
              </div>
            </aside>

            {/* Right Side: IDE Editor, Interactive Terminal & Celebratory Completeness Check */}
            <div className="flex-1 flex flex-col bg-earth-100 p-6 space-y-4 overflow-y-auto">
              
              {/* Celeb completion message */}
              {isAllProjectCompleted && (
                <div className="bg-earth-100 border-2 border-earth-500 rounded-2xl p-6 text-center animate-bounce shadow-md">
                  <span className="text-3xl">🎉</span>
                  <h2 className="text-lg font-extrabold text-earth-800 mt-2">Congratulations! Your Project is Completed!</h2>
                  <p className="text-xs text-earth-500 max-w-md mx-auto mt-1">
                    You have verified and validated all curriculum matrices successfully. Check the automatically updated `README.md` file and download your package.
                  </p>
                </div>
              )}

              {/* Visual Split Panels (Editor Left, Terminal/Preview Right) */}
              <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4">
                
                {/* Left: Code Workspace */}
                <div className="lg:col-span-7 bg-white border border-earth-200 rounded-2xl flex flex-col justify-between overflow-hidden min-h-[420px] shadow-sm">
                  
                  {/* File Workspace Header */}
                  <div className="bg-earth-50 border-b border-earth-200 flex items-center justify-between px-4 py-2">
                    <div className="flex items-center space-x-1 overflow-x-auto">
                      {Object.keys(workspaceFiles).map(name => (
                        <button
                          key={name}
                          onClick={() => setActiveFile(name)}
                          className={`px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center space-x-1 ${
                            activeFile === name
                              ? "bg-white border border-earth-200 text-earth-800 shadow-sm"
                              : "text-earth-400 hover:text-earth-600"
                          }`}
                        >
                          <Icons.FileText />
                          <span>{name}</span>
                          {name !== "main.py" && name !== "README.md" && (
                            <span
                              onClick={(e) => {
                                e.stopPropagation();
                                handleDeleteFile(name);
                              }}
                              className="text-earth-300 hover:text-rose-600 pl-1.5 text-xs font-light"
                            >
                              ×
                            </span>
                          )}
                        </button>
                      ))}

                      <button
                        onClick={() => setShowFileModal(true)}
                        className="p-1 rounded-lg text-earth-400 hover:text-earth-600 hover:bg-white"
                        title="Create New File"
                      >
                        <Icons.Plus />
                      </button>
                    </div>

                    <button
                      onClick={forceAutoReadme}
                      className="text-[10px] text-earth-600 hover:text-earth-800 font-bold tracking-wider"
                    >
                      ⚡ Auto-Generate README
                    </button>
                  </div>

                  {/* Sand/Parchment text editor area */}
                  <div className="flex-1 flex overflow-hidden bg-[#faf8f5]">
                    {/* Line Numbers column */}
                    <div className="w-10 bg-earth-100 text-earth-400 text-right pr-2 py-4 select-none border-r border-earth-200 monospace text-xs leading-relaxed space-y-0.5">
                      {Array.from({ length: 25 }).map((_, i) => (
                        <div key={i}>{i + 1}</div>
                      ))}
                    </div>

                    <textarea
                      value={workspaceFiles[activeFile] || ""}
                      onChange={(e) => {
                        const val = e.target.value;
                        setWorkspaceFiles(prev => ({ ...prev, [activeFile]: val }));
                      }}
                      onKeyDown={handleTabKey}
                      className="flex-1 p-4 bg-[#fdfbf7] text-earth-800 focus:outline-none monospace text-xs leading-relaxed resize-none h-full border-none"
                      spellCheck="false"
                    />
                  </div>

                  {/* Execution footer controls */}
                  <div className="bg-earth-50 border-t border-earth-200 px-4 py-3 flex justify-between items-center">
                    <span className="text-[10px] font-semibold text-earth-400">Sandbox Code Compiler v1.5</span>
                    <div className="flex items-center space-x-2">
                      <button
                        onClick={handleRunCode}
                        className="bg-earth-100 hover:bg-earth-200 text-earth-800 border border-earth-200 px-4 py-1.5 rounded-xl text-xs font-bold transition flex items-center space-x-1"
                      >
                        <Icons.Play />
                        <span>Run Code</span>
                      </button>

                      <button
                        onClick={handleCheckProgress}
                        className="bg-earth-700 hover:bg-earth-800 text-earth-50 px-4 py-1.5 rounded-xl text-xs font-bold transition flex items-center space-x-1"
                      >
                        <span>Check My Progress</span>
                      </button>
                    </div>
                  </div>

                </div>

                {/* Right: Terminal Console logs & Visualization elements */}
                <div className="lg:col-span-5 bg-[#faf8f5] border border-earth-200 rounded-2xl flex flex-col justify-between overflow-hidden min-h-[420px] shadow-sm">
                  
                  {/* Selector tabs */}
                  <div className="bg-earth-100 border-b border-earth-200 flex items-center text-xs">
                    <button
                      onClick={() => setViewMode("terminal")}
                      className={`px-4 py-3 font-bold transition border-b-2 ${
                        viewMode === "terminal" ? "border-earth-600 text-earth-800" : "border-transparent text-earth-400 hover:text-earth-600"
                      }`}
                    >
                      Bash Terminal Logs
                    </button>
                    <button
                      onClick={() => setViewMode("preview")}
                      className={`px-4 py-3 font-bold transition border-b-2 ${
                        viewMode === "preview" ? "border-earth-600 text-earth-800" : "border-transparent text-earth-400 hover:text-earth-600"
                      }`}
                    >
                      Graphic Previews
                    </button>
                  </div>

                  {/* Dynamic Console log layers */}
                  <div className="flex-1 p-4 overflow-y-auto monospace text-xs text-earth-800">
                    {viewMode === "terminal" ? (
                      <div className="space-y-2 h-full flex flex-col justify-between">
                        <pre className="whitespace-pre-wrap leading-relaxed">
                          {terminalLogs.join("\n")}
                        </pre>
                        <div className="flex items-center border-t border-earth-200 pt-2 text-[10px] text-earth-400">
                          <span className="font-bold mr-1.5">$</span>
                          <span>Interactive terminal output tracking.</span>
                        </div>
                      </div>
                    ) : (
                      <div className="h-full flex flex-col items-center justify-center">
                        {previewData ? (
                          <div className="w-full text-center space-y-4 animate-fadeIn">
                            {previewData.type === "chart" && (
                              <div className="bg-white border border-earth-200 p-4 rounded-xl text-left shadow-sm">
                                <span className="text-[9px] font-extrabold text-earth-400 uppercase tracking-widest block mb-1">Interactive Plot Output</span>
                                <h4 className="font-extrabold text-xs text-earth-800 mb-4">{previewData.title}</h4>
                                <div className="flex items-end justify-between px-3 h-32 pt-2">
                                  {previewData.data.map((val, i) => (
                                    <div key={i} className="flex flex-col items-center flex-1 mx-1 group">
                                      <span className="text-[9px] text-earth-400 mb-1 opacity-0 group-hover:opacity-100 transition">{val}</span>
                                      <div
                                        style={{ height: `${(val / 500) * 100}px` }}
                                        className="w-full bg-earth-600 group-hover:bg-earth-700 rounded-t transition-all duration-300"
                                      />
                                      <span className="text-[9px] font-bold mt-1 text-earth-500">{previewData.labels[i]}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}

                            {previewData.type === "sqlite" && (
                              <div className="bg-white border border-earth-200 p-4 rounded-xl text-left space-y-3 shadow-sm">
                                <div className="border-b pb-2 flex justify-between items-center">
                                  <span className="text-[10px] font-extrabold text-earth-400 uppercase tracking-widest">SQLite Explorer</span>
                                  <span className="bg-earth-100 text-earth-700 text-[9px] font-bold px-2 py-0.5 rounded-full">ACTIVE DB</span>
                                </div>
                                <div className="bg-earth-50 border p-3 rounded-lg text-xs space-y-1">
                                  <div className="font-bold">TABLE: users</div>
                                  <div className="text-[10px] font-mono text-earth-500">Columns: [id (INTEGER), score (INTEGER)]</div>
                                </div>
                              </div>
                            )}

                            {previewData.type === "fastapi" && (
                              <div className="bg-white border border-earth-200 p-4 rounded-xl text-left space-y-3 shadow-sm">
                                <div className="border-b pb-2 flex justify-between items-center">
                                  <span className="text-[10px] font-extrabold text-earth-400 uppercase tracking-widest">FastAPI Swagger UI</span>
                                  <span className="bg-emerald-100 text-emerald-800 text-[9px] font-bold px-2 py-0.5 rounded-full">HTTP OK</span>
                                </div>
                                <div className="bg-emerald-50 border border-emerald-100 p-2.5 rounded-lg flex items-center justify-between text-xs text-emerald-800 font-semibold">
                                  <span>GET /</span>
                                  <span className="text-[10px]">Read Home</span>
                                </div>
                                <pre className="p-3 bg-earth-50 rounded-lg text-[10px] text-earth-500 font-mono">
                                  {`{\n  "academy": "PythonVerse",\n  "status": "active"\n}`}
                                </pre>
                              </div>
                            )}
                          </div>
                        ) : (
                          <div className="text-center text-earth-400 py-12">
                            <span className="text-3xl mb-2 block">📊</span>
                            <div className="font-bold text-xs">No preview graphics generated.</div>
                            <p className="text-[10px] max-w-xs mx-auto mt-1">Execute correct main.py logic matching the active milestone checklist to draw visualizations here.</p>
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                </div>

              </div>

            </div>

          </div>

          {/* New File Creation Modal Dialog */}
          {showFileModal && (
            <div className="fixed inset-0 bg-[#3e2920]/40 z-50 flex items-center justify-center p-4">
              <div className="bg-white border border-earth-200 rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-xl">
                <h3 className="font-extrabold text-sm text-earth-800">Add Workspace File</h3>
                <form onSubmit={handleCreateFile} className="space-y-4">
                  <input
                    type="text"
                    placeholder="e.g. database.py or inputs.json"
                    value={newFileName}
                    onChange={e => setNewFileName(e.target.value)}
                    className="w-full px-4 py-2 rounded-xl border border-earth-200 bg-earth-50 text-xs text-earth-800 focus:outline-none focus:ring-2 focus:ring-earth-500 font-mono"
                    required
                  />
                  <div className="flex justify-end space-x-2">
                    <button
                      type="button"
                      onClick={() => setShowFileModal(false)}
                      className="px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-earth-100 transition text-earth-500"
                    >
                      Cancel
                    </button>
                    <button
                      type="submit"
                      className="bg-earth-700 text-earth-50 px-4 py-1.5 rounded-lg text-xs font-bold transition"
                    >
                      Create
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    // --- INITIALIZE ACADEMY APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
