    // --- STREAMING_CHUNK: Starting React Application UI Component Setup... ---
    function App() {
      // Light / Warm Theme Toggle (White / Sand Alabaster)
      const [theme, setTheme] = useState(() => {
        try {
          return localStorage.getItem("pv_theme") || "light";
        } catch (e) {
          return "light";
        }
      });

      // Authentication configurations
      const [currentUser, setCurrentUser] = useState(() => {
        try {
          const saved = localStorage.getItem("pv_user");
          return saved ? JSON.parse(saved) : null;
        } catch (e) {
          return null;
        }
      });

      const [loginId, setLoginId] = useState("");
      const [loginPassword, setLoginPassword] = useState("");
      const [loginError, setLoginError] = useState("");

      // --- STREAMING_CHUNK: Defining and Migrating Cross-User Student Progress Maps... ---
      // We store student progress inside a global progress map. This resolves the zero progress error on logout or when the Admin logs in.
      // We automatically migrate legacy single-session pv_completed_tasks parameters to preserve progress without reset.
      const [studentProgressMap, setStudentProgressMap] = useState(() => {
        let baselineMap = {
          "KD001": [],
          "PJ002": [],
          "RK003": [],
          "SP004": [],
          "KK005": []
        };
        try {
          const savedMap = localStorage.getItem("pv_students_progress_map");
          if (savedMap) {
            return JSON.parse(savedMap);
          }
          // If unified map doesn't exist, check for legacy flat array and migrate it safely
          const legacyTasks = localStorage.getItem("pv_completed_tasks");
          if (legacyTasks) {
            const parsedLegacy = JSON.parse(legacyTasks);
            parsedLegacy.forEach(taskId => {
              if (taskId.startsWith("kd_")) baselineMap["KD001"].push(taskId);
              else if (taskId.startsWith("pj_")) baselineMap["PJ002"].push(taskId);
              else if (taskId.startsWith("rk_")) baselineMap["RK003"].push(taskId);
              else if (taskId.startsWith("sp_")) baselineMap["SP004"].push(taskId);
              else if (taskId.startsWith("kk_")) baselineMap["KK005"].push(taskId);
            });
            // Persist the migrated result immediately
            localStorage.setItem("pv_students_progress_map", JSON.stringify(baselineMap));
          }
        } catch (e) {
          console.error("Migration error:", e);
        }
        return baselineMap;
      });

      // Retrieve completed task IDs of current user
      const completedTaskIds = useMemo(() => {
        if (currentUser && currentUser.role === "student") {
          return studentProgressMap[currentUser.id] || [];
        }
        return [];
      }, [studentProgressMap, currentUser]);

      const [activeTaskIdx, setActiveTaskIndex] = useState(0);

      // --- STREAMING_CHUNK: Initializing workspace virtual workspace files... ---

        try {
          const savedFiles = localStorage.getItem("pv_workspace_files");
          if (savedFiles) return JSON.parse(savedFiles);
        } catch (e) {}

          "main.py": "",
          "data.csv": "Names,Scores\nKedar,320\nPranav,310\nRajlakshmi,420\nSamruddhi,450\nKalyani,390\n",

      const [viewMode, setViewMode] = useState("terminal"); // 'terminal' | 'preview'
      const [previewData, setPreviewContent] = useState(null);
      const [newFileName, setNewFileName] = useState("");
      const [showFileModal, setShowFileModal] = useState(false);
      const [toast, setToast] = useState(null);

      // Admin State Variables
      const [selectedAdminStudentId, setSelectedAdminStudentId] = useState("KD001");
      const [adminAnnTitle, setAdminAnnTitle] = useState("");
      const [adminAnnText, setAdminAnnText] = useState("");
      const [announcements, setAnnouncements] = useState(() => {
        try {
          const saved = localStorage.getItem("pv_announcements");

          ];
        } catch (e) {
          return [];
        }
      });

      // Retrieve student-specific data
      const studentProject = useMemo(() => {

          return PROJECTS_DATABASE[currentUser.id];
        }
        return null;
      }, [currentUser]);

      const activeTask = useMemo(() => {
        if (studentProject) {
          return studentProject.tasks[activeTaskIdx];
        }
        return null;
      }, [studentProject, activeTaskIdx]);

      // Handle loading task template dynamically when task switches
      useEffect(() => {
        if (activeTask) {
          setWorkspaceFiles(prev => ({
            ...prev,
            "main.py": activeTask.codeTemplate
          }));
          setActiveFile("main.py");
          setPreviewContent(null);
        }
      }, [activeTaskIdx, activeTask]);

      // Save states on changes
      useEffect(() => {
        try {
          localStorage.setItem("pv_user", currentUser ? JSON.stringify(currentUser) : "");
          localStorage.setItem("pv_students_progress_map", JSON.stringify(studentProgressMap));
          localStorage.setItem("pv_announcements", JSON.stringify(announcements));
          localStorage.setItem("pv_workspace_files", JSON.stringify(workspaceFiles));
        } catch (e) {}
      }, [currentUser, studentProgressMap, announcements, workspaceFiles]);

      const triggerToast = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      };

      // --- STREAMING_CHUNK: Authenticating Users & Loading Student Environments (Case-Insensitive & Trimmed) ---
      const handleLogin = (e) => {
        e.preventDefault();
        
        // Trim inputs and convert login ID to upper-case to prevent unexpected case-sensitivity login blocks
        const targetId = loginId.trim().toUpperCase();
        const targetPassword = loginPassword.trim();

        const match = USER_ROSTER.find(
          u => u.id.toUpperCase() === targetId && u.password === targetPassword
        );

        if (match) {
          setCurrentUser(match);
          setLoginError("");
          setLoginId("");
          setLoginPassword("");
          triggerToast(`Welcome to PythonVerse, ${match.name}!`);
        } else {
          setLoginError("Invalid predefined ID or password combination. Ensure correct casing and no extra spaces.");
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        triggerToast("Logged out of session.");
      };

      // --- STREAMING_CHUNK: Custom Tab Indentation handler for Textareas... ---
      const handleTabKey = (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const { selectionStart, selectionEnd, value } = e.target;
          const spaces = "    ";
          const updated = value.substring(0, selectionStart) + spaces + value.substring(selectionEnd);
          setWorkspaceFiles(prev => ({ ...prev, [activeFile]: updated }));
          setTimeout(() => {
            e.target.selectionStart = e.target.selectionEnd = selectionStart + spaces.length;
          }, 0);
        }
      };

      // --- STREAMING_CHUNK: Running sandboxed compiler simulations... ---
      const handleRunCode = () => {
        const code = workspaceFiles["main.py"] || "";
        setTerminalLogs(prev => [...prev, `\n$ python main.py`]);
        setViewMode("terminal");

        setTimeout(() => {
          let output = [];

          if (code.includes("import numpy") && (code.includes("np.array") || code.includes("zeros"))) {
            output.push("NumPy: Loading matrix grids successfully...");
            output.push("Matrix dimensions registered in memory.");
            setPreviewContent({
              type: "chart",
              labels: ["X-Zone", "Y-Zone", "Z-Zone"],
              data: [120, 240, 180],
              title: "Normalized Vector Distribution Charts"
            });
          } else if (code.includes("import pandas") && code.includes("pd.DataFrame")) {
            output.push("Pandas: Structuring transaction series dataframe...");
            output.push("Tabular rows parsed successfully.");
            setPreviewContent({
              type: "chart",
              labels: ["Kedar", "Pranav", "Rajlakshmi", "Samruddhi", "Kalyani"],
              data: [320, 310, 420, 450, 390],
              title: "Pandas DataFrame Matrix Output"
            });
          } else if (code.includes("sqlite3") && code.includes("connect")) {
            output.push("SQLite3: Connection established.");
            output.push("Tables registered successfully.");
            setPreviewContent({ type: "sqlite" });
          } else if (code.includes("from fastapi import FastAPI") || code.includes("from flask import Flask")) {
            output.push("Server running on http://127.0.0.1:8000");
            output.push("API routers connected successfully.");
            setPreviewContent({ type: "fastapi" });
          } else {
            output.push("Process exited with return code 0. Standard output stream evaluated.");
          }

          setTerminalLogs(prev => [...prev, output.join("\n")]);
          triggerToast("Run compilation successful!");
        }, 500);
      };

      // --- STREAMING_CHUNK: Running Check My Progress semantic validator checks... ---
      const handleCheckProgress = () => {
        if (!activeTask) return;
        const code = workspaceFiles["main.py"] || "";
        const validated = activeTask.verify(code);

        if (validated) {
          const currentStudentCompletions = studentProgressMap[currentUser.id] || [];
          if (!currentStudentCompletions.includes(activeTask.id)) {
            const nextCompletedList = [...currentStudentCompletions, activeTask.id];
            
            // Save inside cross-user global Student Progress Map
            setStudentProgressMap(prev => ({
              ...prev,
              [currentUser.id]: nextCompletedList
            }));

            triggerToast(`🎉 Task Complete: "${activeTask.title}" verified!`, "success");
            setTerminalLogs(prev => [...prev, `\n[SYSTEM]: Successfully verified task: "${activeTask.title}"`]);

            // Update README.md dynamically
            const autoReadme = `# ${studentProject.projectName} Portfolio\n\n## Roster Owner\n- **Student Name**: ${studentProject.studentName}\n- **Classroom ID**: ${currentUser.id}\n\n## Tasks Completed Matrix\n${nextCompletedList.map((id, index) => {
              const matching = studentProject.tasks.find(t => t.id === id);
              return `- **[x] Task ${index + 1}: ${matching.title}** utilizing *${matching.library}* (Use case: ${matching.useCase})`;
            }).join("\n")}\n\n*Auto-generated on progress checks.*`;
            
            setWorkspaceFiles(prev => ({
              ...prev,
              "README.md": autoReadme
            }));
          } else {
            triggerToast("This task is already verified!", "success");
          }
        } else {
          triggerToast("❌ Verification failed. Please ensure all task requirements are met.", "error");
          setTerminalLogs(prev => [...prev, `\n[SYSTEM ERROR]: Verification failed on "${activeTask.title}". Check imports or array definitions.`]);
        }
      };

      // --- STREAMING_CHUNK: Generating fallback manifest outputs... ---
      const handleDownloadProject = () => {
        let textManifest = `========================================================\nPYTHONVERSE ACADEMY FALLBACK MANIFEST\n========================================================\n\n`;
        Object.keys(workspaceFiles).forEach(fileName => {
          textManifest += `--- FILE: ${fileName} ---\n${workspaceFiles[fileName]}\n\n`;
        });
        const blob = new Blob([textManifest], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${studentProject ? studentProject.projectName.replace(/\s+/g, '_') : 'python_project'}_workspace.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // --- STREAMING_CHUNK: Generating dynamic clean README.md logs... ---
      const forceAutoReadme = () => {
        if (!studentProject) return;
        const currentStudentCompletions = studentProgressMap[currentUser.id] || [];
        const total = studentProject.tasks.length;
        const current = currentStudentCompletions.length;
        
        const text = `# ${studentProject.projectName} Portfolio\n\n## Academic Summary\n- **Project Status**: ${current === total ? "COMPLETED" : "IN PROGRESS"}\n- **Tasks Completed**: ${current} / ${total} tasks checked.\n\n## Progressive Project Tasks Map\n${studentProject.tasks.map((t, idx) => {
          const isDone = currentStudentCompletions.includes(t.id);
          return `### Task ${idx + 1}: ${t.title}\n- **Library/Framework**: \`${t.library}\`\n- **Verification Status**: ${isDone ? "✅ VERIFIED" : "⏳ IN PROGRESS"}\n- **Use case**: ${t.useCase}\n`;
        }).join("\n")}\n\n*Auto-generated inside PythonVerse Sandbox.*`;

        setWorkspaceFiles(prev => ({ ...prev, "README.md": text }));
        setActiveFile("README.md");
        triggerToast("Custom README.md successfully created inside Workspace!");
      };

      // --- STREAMING_CHUNK: Implementing True Multi-File browser ZIP exports... ---
      // We integrate JSZip to gather and compress all file assets dynamically. No simple single files, downloads a real zip folder.
      const handleDownloadProjectZip = () => {
        try {
          const zip = new JSZip();
          
          // Inject all files from student workspace into the ZIP compilation map
          Object.keys(workspaceFiles).forEach(fileName => {
            zip.file(fileName, workspaceFiles[fileName]);
          });

          // Generate binary ZIP stream as asynchronous blog data
          zip.generateAsync({ type: "blob" }).then((contentBlob) => {
            const url = URL.createObjectURL(contentBlob);
            const a = document.createElement("a");
            a.href = url;
            const formattedProjectName = studentProject ? studentProject.projectName.replace(/\s+/g, '_') : 'python_project';
            a.download = `${formattedProjectName}_workspace.zip`;
            a.click();
            URL.revokeObjectURL(url);
            triggerToast("Successfully downloaded full compiled project ZIP archive!");
          }).catch(err => {
            console.error(err);
            triggerToast("Failed to compile ZIP archive. Downloading combined manifest fallback.", "error");
            handleDownloadProject(); // fallback
          });
        } catch (error) {
          console.error(error);
          handleDownloadProject(); // fallback
        }
      };

                    type="text"
                    placeholder="e.g. database.py or inputs.json"
                    value={newFileName}
                    onChange={e => setNewFileName(e.target.value)}
                    className="w-full px-4 py-2 rounded-xl border border-earth-200 bg-earth-50 text-xs text-earth-800 focus:outline-none focus:ring-2 focus:ring-earth-500 font-mono"
                    required
                  />
                  <div className="flex justify-end space-x-2">
                    <button
                      type="button"
                      onClick={() => setShowFileModal(false)}
                      className="px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-earth-100 transition text-earth-500"
                    >
                      Cancel
                    </button>
                    <button
                      type="submit"
                      className="bg-earth-700 text-earth-50 px-4 py-1.5 rounded-lg text-xs font-bold transition"
                    >
                      Create
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    // --- INITIALIZE ACADEMY APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
